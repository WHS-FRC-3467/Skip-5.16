name: Simulate

on:
  workflow_dispatch:
    inputs:
      command_topic:
        description: >
          SmartDashboard NT topic to trigger (write true).
          e.g. /SmartDashboard/Tower/Extend/running
        required: true
      assert_topic:
        description: >
          NT topic to poll for the expected value.
          e.g. /AdvantageKit/Tower/Position
        required: true
      assert_value:
        description: 'Expected numeric value for the assert topic (e.g. 5.0)'
        required: true
      assert_tolerance:
        description: 'Acceptable deviation from the expected value (e.g. 0.5)'
        required: false
        default: '0.5'
      assert_timeout:
        description: 'Seconds to wait for the assert topic to reach the expected value'
        required: false
        default: '15'

jobs:
  simulate:
    name: Run Simulation Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Install Python dependencies
        run: pip install pyntcore --quiet

      - name: Install virtual display
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb netcat-openbsd

      - name: Start Xvfb virtual display
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Start simulation in background
        run: |
          # CI env var is set automatically by GitHub Actions, which disables the sim GUI
          # (see build.gradle: wpi.sim.addGui().defaultEnabled = !System.getenv("CI"))
          ./gradlew simulateJava --no-daemon --console=plain &
          SIM_PID=$!
          echo "SIM_PID=$SIM_PID" >> $GITHUB_ENV
          echo "Simulation started with PID $SIM_PID"

      - name: Wait for simulation NT4 server to be ready
        run: |
          echo "Waiting for NT4 server on port 5810..."
          TIMEOUT=120
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if nc -z localhost 5810 2>/dev/null; then
              echo "NT4 server is up after ${ELAPSED}s"
              break
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "ERROR: NT4 server did not start within ${TIMEOUT}s"
            exit 1
          fi
          # Extra settle time for the robot to finish initializing all subsystems
          sleep 5

      - name: Enable robot in teleop
        run: |
          echo "Enabling robot in teleop via /SimControl/Enable..."
          python3 scripts/nt_reader.py --set true /SimControl/Enable

      - name: Schedule command
        run: |
          echo "Scheduling command: ${{ inputs.command_topic }}"
          python3 scripts/nt_reader.py --set true "${{ inputs.command_topic }}"

      - name: Assert NT topic reaches expected value
        run: |
          echo "Asserting ${{ inputs.assert_topic }} ≈ ${{ inputs.assert_value }} (±${{ inputs.assert_tolerance }}) within ${{ inputs.assert_timeout }}s..."
          python3 scripts/nt_reader.py \
            --wait "${{ inputs.assert_value }}" \
            --tolerance "${{ inputs.assert_tolerance }}" \
            --timeout "${{ inputs.assert_timeout }}" \
            "${{ inputs.assert_topic }}"

      - name: Stop simulation
        if: always()
        run: |
          if [ -n "$SIM_PID" ]; then
            kill "$SIM_PID" 2>/dev/null || true
            wait "$SIM_PID" 2>/dev/null || true
          fi
