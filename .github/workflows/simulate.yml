name: Simulate

on:
  workflow_dispatch:
  push:
    branches:
      - copilot/add-wpilib-simulation-launch

jobs:
  simulate:
    name: Run Simulation + Intake Extend Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Install Python dependencies
        run: pip install pyntcore --quiet

      - name: Install virtual display
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb netcat-openbsd

      - name: Start Xvfb virtual display
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Start simulation in background
        run: |
          # CI env var is set automatically by GitHub Actions, which disables the sim GUI
          # (see build.gradle: wpi.sim.addGui().defaultEnabled = !System.getenv("CI"))
          ./gradlew simulateJava --no-daemon --console=plain &
          SIM_PID=$!
          echo "SIM_PID=$SIM_PID" >> $GITHUB_ENV
          echo "Simulation started with PID $SIM_PID"

      - name: Wait for simulation NT4 server to be ready
        run: |
          echo "Waiting for NT4 server on port 5810..."
          TIMEOUT=120
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if nc -z localhost 5810 2>/dev/null; then
              echo "NT4 server is up after ${ELAPSED}s"
              break
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "ERROR: NT4 server did not start within ${TIMEOUT}s"
            exit 1
          fi
          # Extra settle time for the robot to finish initializing all subsystems
          sleep 5

      - name: Enable robot in teleop
        run: |
          echo "Enabling robot in teleop via /SimControl/Enable..."
          python3 scripts/nt_reader.py --set true /SimControl/Enable

      - name: Schedule 'Intake Linear/Extend' command
        run: |
          echo "Scheduling Intake Linear/Extend command..."
          python3 scripts/nt_reader.py --set true "/SmartDashboard/Intake Linear/Extend/running"

      - name: Assert intake linear position ≈ 22.748 rad
        run: |
          echo "Polling /AdvantageKit/Intake Linear/Position until ≈ 22.748 rad..."
          python3 scripts/nt_reader.py \
            --wait 22.748 --tolerance 0.5 --timeout 15 \
            "/AdvantageKit/Intake Linear/Position"

      - name: Stop simulation
        if: always()
        run: |
          if [ -n "$SIM_PID" ]; then
            kill "$SIM_PID" 2>/dev/null || true
            wait "$SIM_PID" 2>/dev/null || true
          fi
